# Surcharges de DÉVELOPPEMENT LOCAL (auto-fusionnées par `docker compose`).
# ⚠️ NE PAS copier ce fichier sur le homelab : en prod, seul docker-compose.yml
# doit être présent (DB non exposée, cookie Secure).
#
# Deux usages couverts :
#   (A) dev quotidien : `docker compose up -d db` puis uvicorn+vite sur l'hôte
#       → publie 5432 pour que l'uvicorn de l'hôte joigne Postgres.
#   (B) test full-stack local : `docker compose up --build` accédé en http://localhost
#       → cookie en Secure=false (sinon non transmis hors HTTPS).

services:
  db:
    ports:
      - "5432:5432" # dev uniquement

  api:
    environment:
      COOKIE_SECURE: "false" # http://localhost en test local
