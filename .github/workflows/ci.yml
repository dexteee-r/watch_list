name: CI

# Tests essentiels sur chaque push et chaque pull request.
on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend (migrations + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: watchlist
          POSTGRES_USER: watchlist
          POSTGRES_PASSWORD: watchlist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U watchlist -d watchlist"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://watchlist:watchlist@localhost:5432/watchlist
      JWT_SECRET: ci-test-secret-at-least-32-bytes-long-0
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Migrations Alembic (valide le schéma)
        run: alembic upgrade head
      - name: Pytest
        run: pytest -q
