# Point d'entrée unique de l'app : nginx sert le SPA buildé et relaie /api vers
# le conteneur FastAPI. → 1 seul Proxy Host côté NPM, même origine, 0 CORS,
# cookie httpOnly de session transmis tel quel.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Taille max du corps de requête (défense anti-abus).
    client_max_body_size 1m;

    # En-têtes de sécurité, appliqués à toutes les réponses. `always` = même sur
    # les erreurs. Hérités par les locations qui n'ont PAS leur propre add_header.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP adaptée à l'app : JS/CSS/polices en propre, images posters + API depuis TVmaze.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://static.tvmaze.com data:; connect-src 'self' https://api.tvmaze.com; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → conteneur `api` (uvicorn:8000). Le préfixe /api est conservé
    # (les routes FastAPI sont déjà préfixées /api).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets fingerprintés par Vite (immuables) → cache long. On utilise `expires`
    # (et non `add_header Cache-Control`) pour ne PAS bloquer l'héritage des
    # en-têtes de sécurité du bloc server.
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # Fallback SPA : toute route inconnue renvoie index.html (routing côté client).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
