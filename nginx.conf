# Point d'entrée unique de l'app : nginx sert le SPA buildé et relaie /api vers
# le conteneur FastAPI. → 1 seul Proxy Host côté NPM, même origine, 0 CORS,
# cookie httpOnly de session transmis tel quel.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → conteneur `api` (uvicorn:8000). Le préfixe /api est conservé
    # (les routes FastAPI sont déjà préfixées /api).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets fingerprintés par Vite (immuables) → cache long.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA : toute route inconnue renvoie index.html (routing côté client).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
